<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>3D Pano VieweR</title>

<style>

body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:sans-serif;
}

/* UI PANEL */

#ui{

  position:absolute;

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  z-index:10;

  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

/* LOGO */

#logo{

  width:340px;

  animation:
    floatLogo 4s ease-in-out infinite;

  filter:
    drop-shadow(0 0 12px rgba(0,150,255,0.35));

  user-select:none;
  pointer-events:none;
}

/* FLOATING ANIMATION */

@keyframes floatLogo{

  0%{
    transform:
      translateY(0px)
      scale(1);
  }

  50%{
    transform:
      translateY(-8px)
      scale(1.015);
  }

  100%{
    transform:
      translateY(0px)
      scale(1);
  }
}

/* FILE PICKER */

#folderInput{

  color:white;

  background:
    rgba(255,255,255,0.08);

  border:
    1px solid rgba(255,255,255,0.15);

  border-radius:14px;

  padding:14px;

  font-size:16px;

  backdrop-filter:blur(10px);

  cursor:pointer;
}

/* BUTTONS */

button{

  background:
    rgba(20,20,20,0.92);

  color:white;

  border:none;

  border-radius:12px;

  padding:12px 22px;

  font-size:16px;

  cursor:pointer;

  transition:
    transform 0.15s ease,
    background 0.15s ease;
}

button:hover{

  transform:scale(1.05);

  background:
    rgba(40,40,40,0.95);
}

</style>

</head>

<body>

<div id="ui">

  <img
    id="logo"
    src="3D Pano VieweR Logo.png"
    alt="3D Pano VieweR Logo"
  />

  <input
    type="file"
    id="folderInput"
    webkitdirectory
    multiple
  />

</div>

<canvas id="xr-canvas"></canvas>

<script type="module" src="app.js"></script>

</body>
</html>
