<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>3D Pano VieweR</title>

<style>

html,
body{
  width:100%;
  height:100%;
}

body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:sans-serif;
  touch-action:none;
}

#xr-canvas{
  display:block;
  width:100vw;
  height:100vh;
}

/* UI PANEL */

#ui{

  position:absolute;

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  z-index:10;

  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

/* LOGO */

#logo{

  width:340px;

  animation:
    floatLogo 4s ease-in-out infinite;

  filter:
    drop-shadow(0 0 12px rgba(0,150,255,0.35));

  user-select:none;
  pointer-events:none;
}

/* FLOATING ANIMATION */

@keyframes floatLogo{

  0%{
    transform:
      translateY(0px)
      scale(1);
  }

  50%{
    transform:
      translateY(-8px)
      scale(1.015);
  }

  100%{
    transform:
      translateY(0px)
      scale(1);
  }
}

/* FILE PICKER */

#folderInput{

  color:white;

  background:
    rgba(255,255,255,0.08);

  border:
    1px solid rgba(255,255,255,0.15);

  border-radius:14px;

  padding:14px;

  font-size:16px;

  backdrop-filter:blur(10px);

  cursor:pointer;
}

/* BUTTONS */

button{

  background:
    rgba(20,20,20,0.92);

  color:white;

  border:none;

  border-radius:12px;

  padding:12px 22px;

  font-size:16px;

  cursor:pointer;

  transition:
    transform 0.15s ease,
    background 0.15s ease;
}

button:hover{

  transform:scale(1.05);

  background:
    rgba(40,40,40,0.95);
}

button:disabled{

  opacity:0.55;

  cursor:not-allowed;

  transform:none;
}

/* REVISION MARKER */

#rev{
  margin-top:-8px;
  color:rgba(255,255,255,0.6);
  font-size:13px;
  letter-spacing:2px;
  text-transform:uppercase;
  user-select:none;
  pointer-events:none;
}

#actionRow{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
}

</style>

</head>

<body>

<div id="ui">

  <img
    id="logo"
    src="3D Pano VieweR Logo.png"
    alt="3D Pano VieweR Logo"
  />

  <div id="rev">rev.07</div>

  <input
    type="file"
    id="folderInput"
    accept="image/*,audio/*,video/*"
    multiple
  />

  <input
    type="file"
    id="folderPicker"
    webkitdirectory
    multiple
    style="display:none"
  />

  <div id="actionRow">
    <button id="folderButton" type="button">Load a folder</button>
    <button id="clearButton" type="button" style="display:none">Clear saved</button>
  </div>

</div>

<canvas id="xr-canvas"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="app.js?v=07"></script>

</body>
</html>
