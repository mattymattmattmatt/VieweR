<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VR Depth Viewer</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="ui">
    <h1>VR Depth Viewer</h1>
    <p class="subtitle">On Quest, choose image files (or a folder where supported) and include Cardboard Camera .vr.jpg photos, then launch WebXR.</p>
    <label class="picker-title" for="fileInput">Choose Image Files</label>
    <input class="picker-input" type="file" id="fileInput" accept="image/*,.jpg,.jpeg,.png,.webp,.gif,.bmp,.avif,.heic,.heif,.vr.jpg" multiple />
    <label class="picker-title" for="folderInput">Choose Image Folder</label>
    <input class="picker-input" type="file" id="folderInput" webkitdirectory directory mozdirectory multiple />
    <button id="demoPicturesButton" type="button">Demo Pictures</button>
    <div id="loading">Loading files...</div>
    <div id="fileCount">0 image files loaded</div>
    <button id="enterVrButton" type="button" disabled>Enter VR Gallery</button>
  </div>

  <canvas id="xr-canvas"></canvas>

  <script type="module" src="app.js"></script>
</body>
</html>
