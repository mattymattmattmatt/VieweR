<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VR Depth Viewer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="ui">
    <h1>VR Depth Viewer</h1>
    <p class="subtitle">Upload image files (or a folder where supported), then launch WebXR.</p>
    <label class="file-input-label" for="fileInput">Choose Image Files (Quest)</label>
    <input type="file" id="fileInput" accept="image/*,.jpg,.jpeg,.png,.webp,.gif,.bmp,.avif,.heic,.heif" multiple />
    <label class="file-input-label" for="folderInput">Choose Image Folder (Desktop)</label>
    <input type="file" id="folderInput" webkitdirectory multiple />
    <div id="loading">Loading files...</div>
    <div id="fileCount">0 image files loaded</div>
    <button id="enterVrButton" type="button" disabled>Enter VR Gallery</button>
  </div>

  <canvas id="xr-canvas"></canvas>

  <script type="module" src="app.js"></script>
</body>
</html>
