<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
/>

<title>3D Pano VieweR</title>

<style>

html,
body{
  width:100%;
  height:100%;
}

body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:sans-serif;
  touch-action:none;
}

#xr-canvas{
  display:block;
  width:100vw;
  height:100vh;
}

/* UI PANEL */

#ui{

  position:absolute;

  top:50%;
  left:50%;

  transform:translate(-50%,-50%);

  z-index:10;

  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

/* LOGO */

#logo{

  width:340px;

  animation:
    floatLogo 4s ease-in-out infinite;

  filter:
    drop-shadow(0 0 12px rgba(0,150,255,0.35));

  user-select:none;
  pointer-events:none;
}

/* FLOATING ANIMATION */

@keyframes floatLogo{

  0%{
    transform:
      translateY(0px)
      scale(1);
  }

  50%{
    transform:
      translateY(-8px)
      scale(1.015);
  }

  100%{
    transform:
      translateY(0px)
      scale(1);
  }
}

/* FILE PICKER */

#folderInput{

  color:white;

  background:
    rgba(255,255,255,0.08);

  border:
    1px solid rgba(255,255,255,0.15);

  border-radius:14px;

  padding:14px;

  font-size:16px;

  backdrop-filter:blur(10px);

  cursor:pointer;
}

/* BUTTONS */

button{

  background:
    rgba(20,20,20,0.92);

  color:white;

  border:none;

  border-radius:12px;

  padding:12px 22px;

  font-size:16px;

  cursor:pointer;

  transition:
    transform 0.15s ease,
    background 0.15s ease;
}

button:hover{

  transform:scale(1.05);

  background:
    rgba(40,40,40,0.95);
}

button:disabled{

  opacity:0.55;

  cursor:not-allowed;

  transform:none;
}

/* REVISION MARKER */

#rev{
  margin-top:-8px;
  color:rgba(255,255,255,0.6);
  font-size:13px;
  letter-spacing:2px;
  text-transform:uppercase;
  user-select:none;
  pointer-events:none;
}

#actionRow{
  display:flex;
  gap:12px;
  flex-wrap:wrap;
  justify-content:center;
}

/* SUBTLE TOGGLE (e.g. passthrough) */

button.subtle{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.75);
  font-size:13px;
  padding:8px 16px;
  border-radius:999px;
}

button.subtle:hover{
  background:rgba(255,255,255,0.12);
  transform:none;
}

/* SETTINGS BUTTON + PANEL */

#settingsButton{
  position:fixed;
  top:18px;
  right:18px;
  z-index:60;
  width:46px;
  height:46px;
  padding:0;
  border-radius:50%;
  font-size:22px;
  line-height:46px;
  background:rgba(20,28,40,0.7);
  border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.85);
  backdrop-filter:blur(8px);
}

#settingsPanel{
  position:fixed;
  top:74px;
  right:18px;
  z-index:60;
  width:300px;
  display:none;
  flex-direction:column;
  gap:16px;
  padding:20px;
  border-radius:18px;
  background:rgba(16,21,30,0.94);
  border:1px solid rgba(255,255,255,0.14);
  backdrop-filter:blur(14px);
  box-shadow:0 12px 40px rgba(0,0,0,0.5);
  color:#eaf3ff;
}

#settingsPanel.open{
  display:flex;
}

#settingsPanel .panelHeader{
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:18px;
  font-weight:600;
}

#settingsPanel .panelHeader button{
  background:transparent;
  border:none;
  color:rgba(255,255,255,0.6);
  font-size:18px;
  padding:4px 8px;
}

#settingsPanel .settingRow{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  font-size:15px;
}

#settingsPanel input[type="range"]{
  flex:1;
  accent-color:#63adff;
}

#settingsPanel .settingLink{
  display:block;
  text-align:center;
  padding:11px 14px;
  border-radius:12px;
  background:rgba(99,173,255,0.16);
  border:1px solid rgba(99,173,255,0.45);
  color:#cfe6ff;
  font-size:14px;
  text-decoration:none;
}

#settingsPanel .settingLink:hover{
  background:rgba(99,173,255,0.28);
}

/* DRAG-AND-DROP OVERLAY */

#dropOverlay{
  position:fixed;
  inset:0;
  z-index:50;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(5,10,20,0.78);
  backdrop-filter:blur(4px);
}

#dropOverlay.active{
  display:flex;
}

#dropOverlay .box{
  padding:48px 64px;
  border:3px dashed rgba(99,173,255,0.8);
  border-radius:24px;
  color:#eaf3ff;
  font-size:24px;
  letter-spacing:1px;
  text-align:center;
  background:rgba(20,28,40,0.6);
}

</style>

</head>

<body>

<div id="ui">

  <img
    id="logo"
    src="3D Pano VieweR Logo.png"
    alt="3D Pano VieweR Logo"
  />

  <div id="rev">rev.15</div>

  <input
    type="file"
    id="folderInput"
    accept="image/*,audio/*,video/*"
    multiple
  />

  <div id="actionRow">
    <button id="clearButton" type="button" style="display:none">Clear saved</button>
  </div>

</div>

<button id="settingsButton" type="button" title="Settings" aria-label="Settings">⚙</button>

<div id="settingsPanel">
  <div class="panelHeader">
    <span>Settings</span>
    <button id="settingsClose" type="button" aria-label="Close">✕</button>
  </div>

  <div class="settingRow">
    <span>Passthrough</span>
    <button id="passthroughToggle" type="button" class="subtle">Off</button>
  </div>

  <div class="settingRow">
    <label for="brightness">Brightness</label>
    <input id="brightness" type="range" min="0.3" max="1.7" step="0.05" value="1" />
  </div>

  <a class="settingLink" href="Cardboard_Camera_Converter_Pro.html" target="_blank" rel="noopener">
    Cardboard Camera Converter ↗
  </a>
</div>

<div id="dropOverlay">
  <div class="box">Drop images to add them</div>
</div>

<canvas id="xr-canvas"></canvas>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="app.js?v=15"></script>

</body>
</html>
