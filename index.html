<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VR Depth Viewer</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="style.css" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="ui">
    <h1>VR Depth Viewer</h1>
    <p class="subtitle">Quest 3 • Cardboard Camera 3D + 360 Photos • Enter VR → Browse → Convert → View</p>
    <label class="picker-title" for="fileInput">Choose .vr.jpg or 360 Photo</label>
    <input class="picker-input" type="file" id="fileInput" accept=".jpg,.jpeg,.vr.jpg,.vr.jpeg" />
    <div style="margin-top:8px;color:#64748b;font-size:0.82rem;">Single image mode • Auto-converts Cardboard Camera photos</div>
    <button id="enterVrButton" type="button" disabled style="margin-top:16px;">Enter VR</button>
  </div>

  <canvas id="xr-canvas"></canvas>

  <script type="module" src="app.js"></script>
</body>
</html>
